              required:
                - title
                - description
                - topic
      security: []
  /api/agent/default/token:
    get:
      summary: ''
      operationId: getApiAgentDefaultToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  title: 'Operation successful'
                  code: 200
                  data:
                    access_token: YzE4NzA3NTQ2ZTgzZGFhM2NmNTA0MzAxZDQ5Y2VjZmQwYTMxMDkyYTExZjIzMWJkOWZiMGNhMWI1NjNhN2RkYw
