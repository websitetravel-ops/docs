  /api/cart/redeemers:
    get:
      summary: 'List all redeemers for cart or quote.'
      operationId: listAllRedeemersForCartOrQuote
      description: "Retrieves all active redeemers associated with the user's\ncart, session, or a specific quote."
      parameters:
        -
          in: query
          name: quoteId
          description: 'Optional quote ID to filter redeemers'
          example: 16
          required: false
          schema:
            type: integer
            description: 'Optional quote ID to filter redeemers'
            example: 16
        -
          in: query
          name: sessionId
          description: 'Optional session ID for guest users'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Optional session ID for guest users'
            example: architecto
      responses:
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  title: 'Not found'
                  code: 404
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                  title:
                    type: string
                    example: 'Not found'
                  code:
                    type: integer
                    example: 404
                  data:
                    type: string
                    example: null
      tags:
        - Redeemers
      security: []
    post:
      summary: 'Add a new redeemer to cart or quote.'
      operationId: addANewRedeemerToCartOrQuote
      description: "Creates a new redeemer record with traveler details.\nCan be added to active cart, session cart, or a specific quote."
      parameters: []
      responses: {  }
      tags:
        - Redeemers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: "Redeemer's first name"
                  example: architecto
                last_name:
                  type: string
                  description: "Redeemer's last name"
                  example: architecto
                email:
                  type: string
                  description: "Redeemer's email address"
                  example: gbailey@example.net
                phone:
                  type: string
                  description: "Redeemer's phone number"
                  example: architecto
                quoteId:
                  type: integer
                  description: 'Optional quote ID to add redeemer to'
                  example: 16
                sessionId:
                  type: string
                  description: 'Optional session ID for guest users'
                  example: architecto
              required:
                - first_name
                - last_name
                - email
      security: []
  '/api/cart/redeemers/{redeemerId}':
    delete:
      summary: 'Remove a redeemer from cart or quote.'
      operationId: removeARedeemerFromCartOrQuote
      description: "Deletes a redeemer record by ID. The redeemer must belong\nto the authenticated user or session."
      parameters: []
      responses: {  }
