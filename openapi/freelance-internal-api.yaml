          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Agent integrated'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Agent integrated'
        400:
          description: ''
          content:
            application/json:
