                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: YzE4NzA3NTQ2ZTgzZGFhM2NmNTA0MzAxZDQ5Y2VjZmQwYTMxMDkyYTExZjIzMWJkOWZiMGNhMWI1NjNhN2RkYw
