  '/api/cache/product/{tdmsProductId}/price/{ppdid}/details':
    get:
      summary: 'Cache product price availability and booking details.'
      operationId: cacheProductPriceAvailabilityAndBookingDetails
      description: "Fetches and caches fareprice availability for a specific product\nprice detail ID, along with booking details. Requires query parameters\nfor API provider, fare type, booking date, and time."
      parameters:
        -
          in: query
          name: apiProviderId
          description: 'The API provider ID'
          example: 16
          required: true
          schema:
            type: integer
            description: 'The API provider ID'
            example: 16
        -
          in: query
          name: groupFaresForAvailabilityCheck
          description: 'Whether to group fares'
          example: false
          required: true
          schema:
            type: boolean
            description: 'Whether to group fares'
            example: false
        -
          in: query
          name: fareTypeId
          description: 'The fare type ID'
          example: 16
          required: true
          schema:
            type: integer
            description: 'The fare type ID'
            example: 16
        -
          in: query
          name: bookingDate
          description: 'date The booking date (Y-m-d format)'
          example: architecto
          required: true
          schema:
            type: string
            description: 'date The booking date (Y-m-d format)'
            example: architecto
        -
          in: query
          name: timeId
          description: 'The time slot ID'
          example: architecto
          required: true
          schema:
            type: string
            description: 'The time slot ID'
            example: architecto
      responses:
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  title: 'Validation error'
                  code: 400
                  data:
                    bookingDate:
                      - 'The booking date is not a valid date.'
                properties:
                  success:
                    type: boolean
                    example: false
                  title:
                    type: string
                    example: 'Validation error'
                  code:
                    type: integer
                    example: 400
                  data:
                    type: object
                    properties:
                      bookingDate:
                        type: array
                        example:
                          - 'The booking date is not a valid date.'
                        items:
                          type: string
      tags:
        - Caching
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apiProviderId:
                  type: integer
                  description: ''
                  example: 16
                groupFaresForAvailabilityCheck:
                  type: boolean
                  description: ''
                  example: false
                fareTypeId:
                  type: integer
                  description: ''
                  example: 16
                bookingDate:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-02-01T05:49:35'
                timeId:
                  type: string
                  description: ''
                  example: architecto
              required:
                - apiProviderId
                - groupFaresForAvailabilityCheck
                - fareTypeId
                - bookingDate
                - timeId
      security: []
    parameters:
      -
        in: path
        name: tdmsProductId
        description: ''
        example: architecto
        required: true
        schema:
          type: string
      -
        in: path
        name: ppdid
        description: ''
        example: architecto
        required: true
        schema:
          type: string
