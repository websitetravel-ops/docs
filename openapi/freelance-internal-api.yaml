openapi: 3.0.3
info:
  title: 'Freelance Travel App API Documentation'
  description: 'API for the Freelance Travel App - managing users, products, cart, quotes, bookings, and agent integrations.'
  version: 1.0.0
servers:
  -
    url: 'https://confirmation.freelancetravel.com'
tags:
  -
    name: Admin
    description: ''
  -
    name: 'Agent Integration'
    description: "\nAPIs for managing travel agent integrations and upgrades"
  -
    name: 'App Metadata'
    description: ''
  -
    name: Authentication
    description: "\nAPIs for user authentication and account management"
  -
    name: Caching
    description: ''
  -
    name: 'Cart & Quotes'
    description: "\nAPIs for managing shopping cart items, quotes, and bookings"
  -
    name: Discounts
    description: ''
  -
    name: Endpoints
    description: ''
  -
    name: Favourites
    description: ''
  -
    name: Products
    description: "\nAPIs for managing products and home feed"
  -
    name: Redeemers
    description: ''
  -
    name: 'Shared Payments'
    description: ''
  -
    name: System
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/admin/send/notification/topic:
    post:
      summary: 'Send a push notification to a topic.'
      operationId: sendAPushNotificationToATopic
      description: 'Dispatches a push notification to all subscribers of the specified topic.'
      parameters: []
      responses: {  }
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'The notification title'
                  example: architecto
                description:
                  type: string
                  description: 'The notification body text'
                  example: 'Eius et animi quos velit et.'
                topic:
                  type: string
                  description: 'The FCM topic to send to'
                  example: architecto
                data:
                  type: array
                  description: 'Optional additional data payload'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - title
                - description
                - topic
      security: []
  /api/peterpans/admin/send/notification/topic:
    post:
      summary: 'Send a push notification to a topic.'
      operationId: sendAPushNotificationToATopic
