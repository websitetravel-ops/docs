  /api/peterpans/products/home/v2:
    get:
      summary: 'Get Home Feed Products (V2)'
      operationId: getHomeFeedProductsV2
      description: 'Returns products grouped by category labels for the home feed with filtering options.'
      parameters:
        -
          in: query
          name: countryId
          description: 'The country ID to filter products by.'
          example: 1
          required: true
          schema:
            type: integer
            description: 'The country ID to filter products by.'
            example: 1
        -
          in: query
          name: filterBy
          description: 'Filter type. Must be one of: experience, destination, accommodation, transport.'
          example: experience
          required: true
          schema:
            type: string
            description: 'Filter type. Must be one of: experience, destination, accommodation, transport.'
            example: experience
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Products retrieved'
                  data:
                    -
                      label: Activity
                      products: []
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Products retrieved'
                  data:
                    type: array
                    example:
                      -
                        label: Activity
                        products: []
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                          example: Activity
                        products:
                          type: array
                          example: []
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'country and filterBy are required'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'country and filterBy are required'
      tags:
        - Products
      security: []
